category: phone_recording_microphone
display_name: Micro thu âm
collection: microthuamdienthoai
embedding_model: intfloat/multilingual-e5-small
retrieval_limit: 12

required_profile_fields:
  - recording_setup
  - budget
  - usage_preferences

payload_fields:
  brand: metadata.brand_key
  product_type: metadata.product_type
  original_price: metadata.original_price_vnd
  promotional_price: metadata.promotional_price_vnd
  compatibility: metadata.compatibility_tags
  connector: metadata.connector_tags
  features: metadata.feature_tags
  pickup_pattern: metadata.pickup_pattern
  wireless_band: metadata.wireless_band
  transmitter_count: metadata.transmitter_count
  runtime_min: metadata.runtime_min_hours
  transmission_range: metadata.transmission_range_m

payload_indexes:
  metadata.brand_key: keyword
  metadata.product_type: keyword
  metadata.original_price_vnd: integer
  metadata.promotional_price_vnd: integer
  metadata.compatibility_tags: keyword
  metadata.connector_tags: keyword
  metadata.feature_tags: keyword
  metadata.pickup_pattern: keyword
  metadata.wireless_band: keyword
  metadata.transmitter_count: integer
  metadata.runtime_min_hours: float
  metadata.transmission_range_m: float

question_catalog:
  recording_setup:
    question_type: explicit
    question: Bạn dự định kết nối micro với thiết bị và cổng nào?
    options:
      - option_id: iphone_lightning
        label: iPhone hoặc iPad cổng Lightning
        profile_updates: {recording_setup: iphone_lightning}
      - option_id: iphone_usb_c
        label: iPhone hoặc iPad cổng USB-C
        profile_updates: {recording_setup: iphone_usb_c}
      - option_id: android_usb_c
        label: Điện thoại Android cổng USB-C
        profile_updates: {recording_setup: android_usb_c}
      - option_id: camera_3_5mm
        label: Camera qua cổng 3.5 mm
        profile_updates: {recording_setup: camera_3_5mm}
      - option_id: computer_usb
        label: Máy tính qua USB
        profile_updates: {recording_setup: computer_usb}
      - option_id: open
        label: Tôi chưa xác định thiết bị hoặc cổng
        profile_updates: {recording_setup: open}
      - option_id: other
        label: Khác – tôi muốn nhập câu trả lời
        profile_updates: {}

  budget:
    question_type: explicit
    question: Ngân sách tối đa bạn dự kiến dành cho micro là bao nhiêu?
    options:
      - option_id: under_1m
        label: Dưới 1 triệu đồng
        profile_updates: {budget_max_vnd: 1000000}
      - option_id: 1m_3m
        label: Khoảng 1–3 triệu đồng
        profile_updates: {budget_max_vnd: 3000000}
      - option_id: 3m_5m
        label: Khoảng 3–5 triệu đồng
        profile_updates: {budget_max_vnd: 5000000}
      - option_id: over_5m
        label: Trên 5 triệu đồng
        profile_updates:
          budget_segment: premium
          soft_preferences: [premium]
      - option_id: open
        label: Tôi chưa chốt ngân sách
        profile_updates: {budget_segment: open}
      - option_id: other
        label: Khác – tôi muốn nhập câu trả lời
        profile_updates: {}

  usage_preferences:
    question_type: implicit
    question: Nhu cầu thu âm nào gần với bạn nhất?
    options:
      - option_id: solo_content
        label: Quay video hoặc vlog một người
        profile_updates:
          usage_preferences: [solo_content]
          soft_preferences: [easy_setup, portability]
      - option_id: two_person_interview
        label: Phỏng vấn hoặc quay hai người
        profile_updates:
          usage_preferences: [two_person_interview]
          soft_preferences: [stable_dual_recording]
          hard_constraints: {min_transmitter_count: 2}
      - option_id: outdoor_mobile
        label: Thu âm ngoài trời, thường xuyên di chuyển
        profile_updates:
          usage_preferences: [outdoor_mobile]
          soft_preferences: [noise_reduction, portability, long_range]
          implicit_needs: [stable_signal]
      - option_id: podcast_livestream
        label: Podcast, livestream hoặc gaming tại bàn
        profile_updates:
          usage_preferences: [podcast_livestream]
          soft_preferences: [vocal_focus, desk_setup, monitoring]
      - option_id: other
        label: Khác – tôi muốn nhập câu trả lời
        profile_updates: {}
